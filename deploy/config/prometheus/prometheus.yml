# Prometheus 配置 — Step 1: HDFS HA + YARN HA 指标
# scrape Hadoop daemons 的 Prometheus /metrics 端点
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'hadoop-namenode'
    static_configs:
      - targets: ['hadoop01:9870', 'hadoop02:9870']

  - job_name: 'hadoop-datanode'
    static_configs:
      - targets: ['hadoop01:9864', 'hadoop02:9864', 'hadoop03:9864']

  - job_name: 'hadoop-journalnode'
    static_configs:
      - targets: ['hadoop01:8480', 'hadoop02:8480', 'hadoop03:8480']

  - job_name: 'hadoop-resourcemanager'
    static_configs:
      - targets: ['hadoop01:8088', 'hadoop02:8088']

  - job_name: 'hadoop-nodemanager'
    static_configs:
      - targets: ['hadoop01:8042', 'hadoop02:8042', 'hadoop03:8042']

  - job_name: 'hadoop-historyserver'
    static_configs:
      - targets: ['hadoop01:19888']
