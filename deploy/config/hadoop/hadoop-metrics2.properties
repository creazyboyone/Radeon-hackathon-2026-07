# Hadoop Metrics2 -> Prometheus (Hadoop 3.3 原生 PrometheusMetricsSink)
# 每个 daemon 在 web UI 提供 /metrics 端点 (Prometheus text 格式)
# Step 1: HDFS + YARN daemons; Step 2: 加 HBase/Hive

*.sink.prometheus.class=org.apache.hadoop.metrics2.sink.PrometheusMetricsSink
namenode.sink.prometheus.class=org.apache.hadoop.metrics2.sink.PrometheusMetricsSink
datanode.sink.prometheus.class=org.apache.hadoop.metrics2.sink.PrometheusMetricsSink
journalnode.sink.prometheus.class=org.apache.hadoop.metrics2.sink.PrometheusMetricsSink
resourcemanager.sink.prometheus.class=org.apache.hadoop.metrics2.sink.PrometheusMetricsSink
nodemanager.sink.prometheus.class=org.apache.hadoop.metrics2.sink.PrometheusMetricsSink

*.period=10
