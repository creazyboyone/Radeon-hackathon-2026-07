# =============================================================================
# docker-compose.yml — Phase 1 Step 1: HDFS HA + YARN HA + ZooKeeper quorum
#
# 网络: 自定义 bridge, 每容器独立 IP (10.20.0.x), 不用 host 模式。
# 镜像: 自建 aiops-hadoop:step1 (docker compose build 首次构建)。
# 数据: 命名卷 hadoopXX-data / hadoopXX-logs, 持久保存; reset.sh 可清。
# =============================================================================
version: "3.8"
name: aiops-ha

services:
  # ========================================================
  # 3 重型 Hadoop 节点
  # ========================================================
  hadoop01:
    build:
      context: ./image
      dockerfile: Dockerfile
    image: aiops-hadoop:step1
    container_name: hadoop01
    hostname: hadoop01
    environment:
      NODE_ROLE: hadoop01
    volumes:
      - ./config/hadoop:/opt/hadoop/etc/hadoop:ro
      - ./config/zookeeper/zoo.cfg:/opt/zookeeper/conf/zoo.cfg:ro
      - hadoop01-data:/data
      - hadoop01-logs:/logs
    networks:
      aiopsnet:
        ipv4_address: 10.20.0.11
    ports:
      - "9870:9870"   # NN1 web
      - "8088:8088"   # RM1 web
      - "19888:19888" # JobHistory web

  hadoop02:
    build:
      context: ./image
      dockerfile: Dockerfile
    image: aiops-hadoop:step1
    container_name: hadoop02
    hostname: hadoop02
    environment:
      NODE_ROLE: hadoop02
    volumes:
      - ./config/hadoop:/opt/hadoop/etc/hadoop:ro
      - ./config/zookeeper/zoo.cfg:/opt/zookeeper/conf/zoo.cfg:ro
      - hadoop02-data:/data
      - hadoop02-logs:/logs
    networks:
      aiopsnet:
        ipv4_address: 10.20.0.12
    ports:
      - "9871:9870"   # NN2 web (remapped, standby)
      - "8081:8088"   # RM2 web (remapped, standby)

  hadoop03:
    build:
      context: ./image
      dockerfile: Dockerfile
    image: aiops-hadoop:step1
    container_name: hadoop03
    hostname: hadoop03
    environment:
      NODE_ROLE: hadoop03
    volumes:
      - ./config/hadoop:/opt/hadoop/etc/hadoop:ro
      - ./config/zookeeper/zoo.cfg:/opt/zookeeper/conf/zoo.cfg:ro
      - hadoop03-data:/data
      - hadoop03-logs:/logs
    networks:
      aiopsnet:
        ipv4_address: 10.20.0.13

  # ========================================================
  # 监控栈
  # ========================================================
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      aiopsnet:
        ipv4_address: 10.20.0.20
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager
    container_name: alertmanager
    networks:
      aiopsnet:
        ipv4_address: 10.20.0.21
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      aiopsnet:
        ipv4_address: 10.20.0.22
    ports:
      - "3000:3000"

# ========================================================
# 卷 & 网络
# ========================================================
volumes:
  hadoop01-data:
  hadoop01-logs:
  hadoop02-data:
  hadoop02-logs:
  hadoop03-data:
  hadoop03-logs:

networks:
  aiopsnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/24
