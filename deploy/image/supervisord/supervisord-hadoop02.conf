; supervisord 自含配置 — hadoop02 (standby NN + standby RM, 无 JHS)
[supervisord]
nodaemon=true
user=root
logfile=/logs/supervisord.log
pidfile=/tmp/supervisord.pid

[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:zookeeper]
command=/opt/zookeeper/bin/zkServer.sh start-foreground
autostart=true ; autorestart=true ; startsecs=3  ; priority=10
stdout_logfile=/logs/zk.log  ; stderr_logfile=/logs/zk.err

[program:journalnode]
command=/opt/hadoop/bin/hdfs journalnode
autostart=true ; autorestart=true ; startsecs=3  ; priority=20
stdout_logfile=/logs/jn.log  ; stderr_logfile=/logs/jn.err

[program:nodemanager]
command=/opt/hadoop/bin/yarn nodemanager
autostart=true ; autorestart=true ; startsecs=3  ; priority=40
stdout_logfile=/logs/nm.log  ; stderr_logfile=/logs/nm.err

[program:datanode]
command=/opt/hadoop/bin/hdfs datanode
autostart=true ; autorestart=true ; startsecs=3  ; priority=30
stdout_logfile=/logs/dn.log  ; stderr_logfile=/logs/dn.err

[program:namenode]
command=/opt/hadoop/bin/hdfs namenode
autostart=true ; autorestart=true ; startsecs=10 ; priority=50
stdout_logfile=/logs/nn.log  ; stderr_logfile=/logs/nn.err

[program:zkfc]
command=/opt/hadoop/bin/hdfs zkfc
autostart=true ; autorestart=true ; startsecs=5  ; priority=60
stdout_logfile=/logs/zkfc.log ; stderr_logfile=/logs/zkfc.err

[program:resourcemanager]
command=/opt/hadoop/bin/yarn resourcemanager
autostart=true ; autorestart=true ; startsecs=10 ; priority=70
stdout_logfile=/logs/rm.log  ; stderr_logfile=/logs/rm.err

[program:hivemetastore]
command=/opt/hive/bin/hive --service metastore
environment=HADOOP_HEAPSIZE="256",JAVA_HOME="/usr/lib/jvm/java-21-openjdk-amd64"
autostart=true ; autorestart=true ; startsecs=10 ; priority=90
stdout_logfile=/logs/hms.log  ; stderr_logfile=/logs/hms.err

[program:hiveserver2]
command=/opt/hive/bin/hiveserver2
environment=HADOOP_HEAPSIZE="256",JAVA_HOME="/usr/lib/jvm/java-21-openjdk-amd64"
autostart=true ; autorestart=true ; startsecs=10 ; priority=100
stdout_logfile=/logs/hs2.log  ; stderr_logfile=/logs/hs2.err

[program:hmaster]
command=/opt/hbase/bin/hbase master start
environment=HBASE_HEAPSIZE="256"
autostart=true ; autorestart=true ; startsecs=10 ; priority=110
stdout_logfile=/logs/hm.log  ; stderr_logfile=/logs/hm.err

[program:regionserver]
command=/opt/hbase/bin/hbase regionserver start
environment=HBASE_HEAPSIZE="256"
autostart=true ; autorestart=true ; startsecs=10 ; priority=120
stdout_logfile=/logs/rs.log  ; stderr_logfile=/logs/rs.err
