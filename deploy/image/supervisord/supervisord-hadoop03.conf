; supervisord 自含配置 — hadoop03 (仅 leaf daemon: ZK+JN+DN+NM)
[supervisord]
nodaemon=true
user=root
logfile=/logs/supervisord.log
pidfile=/tmp/supervisord.pid

[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:zookeeper]
command=/opt/zookeeper/bin/zkServer.sh start-foreground
autostart=true ; autorestart=true ; startsecs=3  ; priority=10
stdout_logfile=/logs/zk.log  ; stderr_logfile=/logs/zk.err

[program:journalnode]
command=/opt/hadoop/bin/hdfs journalnode
autostart=true ; autorestart=true ; startsecs=3  ; priority=20
stdout_logfile=/logs/jn.log  ; stderr_logfile=/logs/jn.err

[program:nodemanager]
command=/opt/hadoop/bin/yarn nodemanager
autostart=true ; autorestart=true ; startsecs=3  ; priority=40
stdout_logfile=/logs/nm.log  ; stderr_logfile=/logs/nm.err

[program:datanode]
command=/opt/hadoop/bin/hdfs datanode
autostart=true ; autorestart=true ; startsecs=3  ; priority=30
stdout_logfile=/logs/dn.log  ; stderr_logfile=/logs/dn.err

[program:regionserver]
command=/opt/hbase/bin/hbase regionserver start
environment=HBASE_HEAPSIZE="256"
autostart=true ; autorestart=true ; startsecs=10 ; priority=120
stdout_logfile=/logs/rs.log  ; stderr_logfile=/logs/rs.err
